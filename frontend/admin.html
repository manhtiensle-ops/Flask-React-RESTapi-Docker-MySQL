<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin System - Classified</title>
    <style>
        body {
            background: #0a0a0a; color: #00ff41;
            font-family: 'Courier New', monospace;
            margin: 0; overflow: hidden;
        }
        .dashboard {
            display: grid; grid-template-columns: 250px 1fr;
            height: 100vh;
        }
        .sidebar {
            border-right: 1px solid #00ff41; padding: 20px;
            background: rgba(0, 255, 65, 0.05);
        }
        .main-content { padding: 40px; position: relative; }
        .glitch {
            font-size: 3rem; font-weight: bold;
            text-shadow: 2px 2px #ff0000, -2px -2px #0000ff;
            animation: pulse 2s infinite;
        }
        .stat-card {
            border: 1px solid #00ff41; padding: 20px;
            margin-top: 20px; background: rgba(0,0,0,0.8);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }
        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; }
        }
        .matrix-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.1;
            background: linear-gradient(0deg, rgba(0,255,65,0.1) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,65,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <h3>SYSTEM CORE</h3>
            <p>> NETWORK: ACTIVE</p>
            <p>> DATABASE: ENCRYPTED</p>
            <p>> LOGS: MONITORING</p>
            <hr color="#00ff41">
            <button onclick="location.href='index.html'" style="background:none; border:1px solid #00ff41; color:#00ff41; cursor:pointer; width:100%; padding:10px;">TERMINATE SESSION</button>
        </div>
        <div class="main-content">
            <div class="matrix-bg"></div>
            <div class="glitch">ADMIN DASHBOARD V1.0</div>
            <div class="stat-card">
                <h2>SERVER STATUS: SECURE</h2>
                <p>Uptime: 99.9% | Active Connections: 127.0.0.1</p>
                <progress value="75" max="100" style="width:100%"></progress>
            </div>
            <div class="stat-card">
                <h3>VULNERABILITY SCANNER</h3>
                <p>[OK] SQL Injection Shield Active</p>
                <p>[OK] XSS Filtering Enabled</p>
                <p style="color: yellow;">[WARN] Debug Mode is ON (Backend)</p>
            </div>
        </div>
    </div>
</body>
</html>
