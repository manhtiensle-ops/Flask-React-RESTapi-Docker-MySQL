services:
  frontend:
    build: ./frontend/
    restart: on-failure
    ports:
      - "8080:80"
    
    depends_on:
      - backend
  backend:
    build: ./backend/
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: testdb
    # ports:
    #   - "3306:3306"
    volumes:
      - ./data/db.sql:/docker-entrypoint-initdb.d/db.sql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db 
    depends_on:
      - db