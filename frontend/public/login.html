<!DOCTYPE html>
<html lang="vi">
<head>
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure & Beautiful Login</title>
    <style>
        /* --- CSS Reset --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* --- Background & Layout --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Gradient màu tím xanh hiện đại */
            overflow: hidden;
        }

        /* --- Hiệu ứng Kính mờ (Glassmorphism) --- */
        .login-container {
            position: relative;
            width: 400px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.1); /* Nền trắng trong suốt */
            border-radius: 20px;
            backdrop-filter: blur(10px); /* Làm mờ hậu cảnh */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards; /* Hiệu ứng hiện hình khi load */
        }

        @keyframes fadeIn {
            to { transform: translateY(0); opacity: 1; }
        }

        .login-container h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* --- Thiết kế Input (Neumorphism nhẹ) --- */
        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            outline: none;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: 0.3s; /* Hiệu ứng mượt mà khi focus */
        }

        .input-group input::placeholder { color: rgba(255, 255, 255, 0.7); }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2), 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* --- Nút bấm (Hiệu ứng Ripple & Hover) --- */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            outline: none;
            border-radius: 30px;
            background: #fff;
            color: #764ba2;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease; /* Hiệu ứng mượt mà khi hover */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: #f0f0f0;
            transform: translateY(-2px); /* Nổi lên nhẹ */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(1px); /* Lún xuống khi click */
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        /* --- Thông báo lỗi --- */
        #message {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            min-height: 1em; /* Giữ chỗ để không bị giật giao diện */
            transition: 0.3s;
        }

        /* Trang trí thêm: Các vòng tròn lơ lửng */
        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            z-index: -1; /* Nằm dưới form */
            animation: float 10s infinite linear; /* Hiệu ứng trôi nổi */
        }

        .circle1 { width: 200px; height: 200px; top: -100px; right: -100px; }
        .circle2 { width: 150px; height: 150px; bottom: -50px; left: -50px; animation-delay: -2s; }
        .circle3 { width: 100px; height: 100px; bottom: 150px; right: 100px; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(-35px) translateX(-10px); }
            75% { transform: translateY(-20px) translateX(-20px); }
        }

    </style>
</head>
<body>
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>

    <div class="login-container">
        <h2>ĐĂNG NHẬP HỆ 1THỐNG</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Tên đăng nhập" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" id="submitBtn">Đăng Nhập</button>
        </form>
        <p id="message"></p>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
