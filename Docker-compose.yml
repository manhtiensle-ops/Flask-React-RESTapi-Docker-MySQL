services:
  frontend:
    build: ./frontend/
    ports:
      - "8080:80"
    develop:
      watch:
        - action: sync
          path: ./frontend/public
          target: /usr/share/nginx/html/

        - action: sync
          path: ./frontend/root
          target: ./admin

        - action: sync+restart
          path: ./frontend/default.conf
          target: /etc/nginx/conf.d/default.conf
    depends_on:
      - backend
  backend:
    build: ./backend/
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /backend
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: testdb
    # ports:
    #   - "3306:3306"
    volumes:
      - ./data/mydata:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db 
    depends_on:
      - db